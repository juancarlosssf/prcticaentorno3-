<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Emails - Ateneo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 2px dashed #667eea;
        }

        .upload-section input[type="file"] {
            display: block;
            margin: 10px 0;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        .results {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .result-box {
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #28a745;
        }

        .result-box.invalidos {
            border-left-color: #dc3545;
        }

        .result-box h2 {
            font-size: 18px;
            margin-bottom: 15px;
        }

        .result-box.validos h2 {
            color: #28a745;
        }

        .result-box.invalidos h2 {
            color: #dc3545;
        }

        .result-box ul {
            list-style: none;
        }

        .result-box li {
            padding: 8px;
            margin: 5px 0;
            background: #f8f9fa;
            border-radius: 4px;
            font-size: 14px;
        }

        .stats {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            color: #0066cc;
        }

        .error {
            color: #dc3545;
            background: #f8d7da;
            padding: 12px;
            border-radius: 4px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 Validador de Emails</h1>
        <p class="subtitle">Socios del Ateneo</p>

        <div class="upload-section">
            <label for="csvFile">Selecciona archivo CSV:</label>
            <input type="file" id="csvFile" accept=".csv">
            <button onclick="validarCSV()">Validar Emails</button>
        </div>

        <div id="stats" class="stats" style="display: none;"></div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="results" class="results" style="display: none;"></div>
    </div>

    <script>
        function validarCSV() {
            const fileInput = document.getElementById('csvFile');
            const file = fileInput.files[0];

            if (!file) {
                mostrarError('Por favor, selecciona un archivo CSV');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const contenido = e.target.result;
                    const lineas = contenido.split('\n').filter(linea => linea.trim());
                    
                    const validos = [];
                    const invalidos = [];

                    for (let i = 1; i < lineas.length; i++) {
                        const [nombre, correo] = lineas[i].split(',').map(x => x.trim());
                        if (nombre && correo) {
                            if (esEmailValido(correo)) {
                                validos.push({ nombre, correo });
                            } else {
                                invalidos.push({ nombre, correo });
                            }
                        }
                    }

                    mostrarResultados(validos, invalidos);
                } catch (error) {
                    mostrarError('Error al procesar el CSV: ' + error.message);
                }
            };
            reader.readAsText(file);
        }

        function esEmailValido(email) {
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return regex.test(email);
        }

        function mostrarResultados(validos, invalidos) {
            document.getElementById('error').style.display = 'none';

            const statsDiv = document.getElementById('stats');
            statsDiv.innerHTML = `
                Total: ${validos.length + invalidos.length} | 
                ✓ Válidos: ${validos.length} | 
                ✗ Inválidos: ${invalidos.length}
            `;
            statsDiv.style.display = 'block';

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="result-box validos">
                    <h2>✓ Válidos (${validos.length})</h2>
                    <ul>
                        ${validos.map(s => `<li><strong>${s.nombre}</strong>: ${s.correo}</li>`).join('')}
                    </ul>
                </div>
                <div class="result-box invalidos">
                    <h2>✗ Inválidos (${invalidos.length})</h2>
                    <ul>
                        ${invalidos.map(s => `<li><strong>${s.nombre}</strong>: ${s.correo}</li>`).join('')}
                    </ul>
                </div>
            `;
            resultsDiv.style.display = 'grid';
        }

        function mostrarError(mensaje) {
            document.getElementById('results').style.display = 'none';
            document.getElementById('stats').style.display = 'none';
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = '✗ ' + mensaje;
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
